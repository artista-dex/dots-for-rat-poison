#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 12;
shadow-opacity = 0.4;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Dunst'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
# Fading (smooth animations)
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

#################################
# Transparency (important part)
#################################

active-opacity = 1.0;
inactive-opacity = 0.92;
frame-opacity = 1.0;

# Optional per-app rules (recommended instead of global opacity hacks)
opacity-rule = [
  "90:class_g = 'Alacritty'",
  "90:class_g = 'kitty'",
  "85:class_g = 'URxvt'",
  "85:class_g = 'code-oss'",
  "80:class_g = 'discord'"
];

#################################
# Blur (works in picom v13+ with GLX)
#################################

blur: {
  method = "dual_kawase";
  strength = 5;
};

blur-background = true;

blur-background-exclude = [
  "class_g = 'slop'",
  "class_g = 'firefox' && focused"
];

#################################
# Fixes / stability
#################################

detect-client-opacity = true;
use-damage = false;

#################################
# Corner / misc polish
#################################

unredir-if-possible = false;
wintypes:
{
  tooltip = { fade = true; shadow = false; };
  popup_menu = { shadow = false; };
  dropdown_menu = { shadow = false; };
}
